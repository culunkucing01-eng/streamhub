version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streamhub}
      POSTGRES_USER: ${POSTGRES_USER:-streamhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  srs:
    image: ossrs/srs:5
    restart: always
    ports:
      - "1935:1935"
      - "127.0.0.1:1985:1985"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8000:8000"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf:ro
      - srs_data:/usr/local/srs/objs
    environment:
      CANDIDATE: ${DOMAIN:-studioserver.space}

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-streamhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streamhub}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      SRS_API_URL: http://localhost:1985
      SRS_PLAYBACK_URL: https://${DOMAIN:-studioserver.space}
      APP_DOMAIN: ${DOMAIN:-studioserver.space}
      FRONTEND_URL: https://${DOMAIN:-studioserver.space}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: https://${DOMAIN:-studioserver.space}/api/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
      srs:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: always
    ports:
      - "127.0.0.1:8079:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - srs

volumes:
  postgres_data:
  srs_data:
