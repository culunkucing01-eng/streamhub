version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-streamhub}
      POSTGRES_USER: ${POSTGRES_USER:-streamhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: always
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-streamhub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-streamhub}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      SRS_API_URL: ${SRS_API_URL:-http://srs:1985}
      SRS_PLAYBACK_URL: ${SRS_PLAYBACK_URL:-http://srs:8080}
      APP_DOMAIN: ${DOMAIN}
      FRONTEND_URL: http://${DOMAIN}:${APP_PORT:-8088}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: http://${DOMAIN}:${APP_PORT:-8088}/api/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: always
    ports:
      - "127.0.0.1:8079:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
